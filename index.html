<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Prueba de carga de imagen - Ultra simple</title>
</head>
<body>
    <h2>Sube una foto JPG</h2>
    <input type="file" id="inputImagen" accept="image/jpeg, image/png">
    <div id="mensaje"></div>
    <div id="contenedorImagen"></div>

    <script>
        const input = document.getElementById('inputImagen');
        const mensaje = document.getElementById('mensaje');
        const contenedor = document.getElementById('contenedorImagen');

        input.addEventListener('change', (e) => {
            const archivo = e.target.files[0];
            if (!archivo) return;

            mensaje.innerHTML = `Archivo seleccionado: ${archivo.name}, tamaño: ${archivo.size} bytes, tipo: ${archivo.type}`;

            // Mostrar la imagen usando URL.createObjectURL
            const url = URL.createObjectURL(archivo);
            const img = document.createElement('img');
            img.style.maxWidth = '100%';
            img.style.border = '1px solid red';

            img.onload = () => {
                mensaje.innerHTML += `<br>✅ IMAGEN CARGADA CORRECTAMENTE. Dimensiones: ${img.naturalWidth} x ${img.naturalHeight}`;
                URL.revokeObjectURL(url);
            };
            img.onerror = (err) => {
                mensaje.innerHTML += `<br>❌ ERROR: No se pudo cargar la imagen. El archivo parece corrupto o no es una imagen válida.`;
                console.error('Error de carga', err);
            };
            img.src = url;
            contenedor.innerHTML = '';
            contenedor.appendChild(img);
        });
    </script>
</body>
</html>
