<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba de carga de imagen - Diagnóstico</title>
    <link href="https://cdn.jsdelivr.net/npm/cropperjs@1.5.12/dist/cropper.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/cropperjs@1.5.12/dist/cropper.min.js"></script>
    <style>
        body { font-family: monospace; padding: 20px; max-width: 800px; margin: auto; }
        #log { background: #f4f4f4; padding: 10px; border-radius: 8px; margin: 20px 0; white-space: pre-wrap; font-size: 12px; max-height: 200px; overflow: auto; }
        img { max-width: 100%; margin-top: 20px; display: none; }
        button { margin: 10px 5px; padding: 8px 16px; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h2>Diagnóstico: Carga de imagen para recorte</h2>
    <input type="file" id="fileInput" accept="image/jpeg, image/png, image/jpg">
    <div id="log">Esperando archivo...</div>
    <img id="preview">
    <div id="cropperContainer"></div>
    <button id="testCropper" style="display:none;">Iniciar Cropper (si la imagen cargó)</button>

    <script>
        const fileInput = document.getElementById('fileInput');
        const logDiv = document.getElementById('log');
        const previewImg = document.getElementById('preview');
        const testBtn = document.getElementById('testCropper');
        let cropper = null;

        function log(msg, isError = false) {
            const p = document.createElement('div');
            p.textContent = msg;
            p.className = isError ? 'error' : 'success';
            logDiv.appendChild(p);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(msg);
        }

        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) return;

            log(`📁 Archivo seleccionado: ${file.name}, tipo: ${file.type}, tamaño: ${file.size} bytes`);

            // Verificar si el tipo MIME es válido
            if (!file.type.startsWith('image/')) {
                log(`❌ Tipo MIME inválido: ${file.type}. No es una imagen.`, true);
                return;
            }

            // Usar FileReader para leer como DataURL (más fiable)
            const reader = new FileReader();
            reader.onload = function(e) {
                const dataURL = e.target.result;
                log(`✅ Archivo leído como DataURL (longitud: ${dataURL.length})`);

                // Mostrar la imagen en el elemento <img>
                previewImg.src = dataURL;
                previewImg.style.display = 'block';
                previewImg.onload = () => {
                    log(`🖼️ Imagen cargada correctamente. Dimensiones: ${previewImg.naturalWidth} x ${previewImg.naturalHeight}`);
                    testBtn.style.display = 'inline-block';
                };
                previewImg.onerror = (err) => {
                    log(`❌ Error al cargar la imagen en el DOM. Posible corrupción.`, true);
                    console.error(err);
                };
            };
            reader.onerror = (err) => {
                log(`❌ FileReader falló: ${err.target.error}`, true);
            };
            reader.readAsDataURL(file);
        });

        testBtn.addEventListener('click', () => {
            if (!previewImg.src || !previewImg.naturalWidth) {
                log('No hay imagen válida para recortar', true);
                return;
            }
            if (cropper) cropper.destroy();
            try {
                cropper = new Cropper(previewImg, {
                    aspectRatio: 3/4,
                    viewMode: 2,
                    autoCropArea: 0.8,
                });
                log('✅ Cropper inicializado con éxito. Ahora puedes usar "Generar 5 copias" si integras esa parte.');
            } catch(e) {
                log(`❌ Error al iniciar Cropper: ${e.message}`, true);
            }
        });
    </script>
</body>
</html>
